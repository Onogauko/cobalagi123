name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Show project files
        run: |
          pwd
          find . -type f | sort

      - name: Inspect wrapper
        run: |
          ls -lah gradle/wrapper
          file gradle/wrapper/gradle-wrapper.jar || true
          sha256sum gradle/wrapper/gradle-wrapper.jar || true

      - name: Test wrapper jar
        run: |
          jar tf gradle/wrapper/gradle-wrapper.jar | head -20

      - name: Run Gradle
        run: |
          chmod +x gradlew
          ./gradlew --version
